# Wraith config -- YASHnet Lab
# Dell Proxmox: BadBlood AD + vulnerable web apps

target:
  domain: "YASHnet.local"
  dc: "172.16.20.5"
  hosts:
    - ip: "172.16.20.103"
      name: "Win10PC1"
      web_url: "http://172.16.20.103:3000"
      web_app: "juice-shop"
    - ip: "172.16.20.104"
      name: "Win11PC1"
      web_url: "http://172.16.20.104:3000"
      web_app: "juice-shop"
  credentials:
    domain_user: "yash"
    domain_pass: ""  # start with no creds -- earn them via attacks
    web_dvwa_user: "admin"
    web_dvwa_pass: "password"

engagement:
  type: internal
  network_interface: "eth0"  # B6: Kali interface for Responder (eth0 on Parallels/Docker)

attack:
  randomize: true         # random target selection + timing
  delay_min_sec: 5
  delay_max_sec: 30
  phases: [1, 2, 3, 4, 5, 6]

output:
  log_dir: "./attack-logs"
  report: true

# v3: Adaptive pipeline settings (optional, has defaults)
planning:
  max_rounds: 10
  max_total_agents: 30
  max_concurrent_agents: 3
  objective: "full_assessment"
  stealth_mode: false

report:
  react_max_iterations: 5
  react_min_tool_calls: 3
