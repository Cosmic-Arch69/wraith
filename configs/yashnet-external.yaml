# Wraith config -- YASHnet External Assessment
# Attacker starts outside: only WAN IP known, no internal topology, no creds
# pfSense WAN: 10.0.0.183
# Exposed ports: 8080->Win10:80, 8081->Win11:80, 3001->Win10:3000, 3002->Win11:3000,
#                9443->Wazuh:443, 2200->DC1:3389, 3389->Win10:3389, 3390->Win11:3389

engagement:
  type: external
  wan_ip: "10.0.0.183"  # TODO v3.7.0: update to 192.168.200.1 after Kali dual-NIC setup (see docs/network-topology.md)
  network_interface: "eth0"  # B6: not used in external mode (Responder disabled), but kept for consistency
  name: "YASHnet External Assessment"
  authorization:
    tester_name: "Jaswanth Reddy Gorantla"
    tester_role: "graduate cybersecurity student"
    infrastructure: "Proxmox homelab on Dell PowerEdge (10.0.0.31)"
    environment: "Isolated VLANs -- no internet-facing production systems"
    purpose: "Security education, SOAR validation, detection engineering coursework"
    monitoring: "Wazuh SIEM actively monitoring all activity for defensive analysis"

target:
  domain: "YASHnet.local"
  dc: ""                          # unknown -- attacker discovers via OSINT
  hosts:
    - ip: "10.0.0.183"
      name: "pfSense-WAN"
  credentials:
    domain_user: ""               # none -- attacker earns them
    domain_pass: ""

attack:
  randomize: true
  delay_min_sec: 5
  delay_max_sec: 30
  phases: [0, 1, 2, 3, 4, 5, 6]  # phase 0 = osint-recon (external entry point)

output:
  log_dir: "./attack-logs-external"
  report: true

planning:
  max_rounds: 15
  max_total_agents: 50
  max_concurrent_agents: 5
  objective: "full_assessment"
  stealth_mode: true

report:
  react_max_iterations: 5
  react_min_tool_calls: 3
