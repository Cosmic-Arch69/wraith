target:
  domain: "YASHnet.local"
  dc: "172.16.20.5"
  hosts:
    - ip: "172.16.20.103"
      name: "Win10PC1"
      web_url: "http://172.16.20.103:3000"
      web_app: "juice-shop"
    - ip: "172.16.20.104"
      name: "Win11PC1"
      web_url: "http://172.16.20.104:3000"
      web_app: "juice-shop"
  credentials:
    domain_user: "yash"
    domain_pass: ""  # start with no creds -- earn them via attacks
    web_dvwa_user: "admin"
